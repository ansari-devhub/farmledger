          description: ''
    post:
      operationId: v1_farms_create
      summary: Create a farm
      tags:
      - Farms
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Farm'
          application/x-www-form-urlencoded:
            schema:
