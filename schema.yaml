components:
  schemas:
    Buyer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 20
        location:
          type: string
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    Crop:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        variety:
          type: string
          maxLength: 100
        crop_type:
          $ref: '#/components/schemas/CropTypeEnum'
      required:
      - id
      - name
    CropTypeEnum:
      enum:
      - cereal
      - legume
      - vegetable
      - fruit
      - tuber
      - other
      type: string
      description: |-
        * `cereal` - Cereal
        * `legume` - Legume
        * `vegetable` - Vegetable
        * `fruit` - Fruit
        * `tuber` - Tuber
        * `other` - Other
    Farm:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        location:
          type: string
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    HarvestRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        harvest_date:
          type: string
          format: date
        quantity_kg:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quality_grade:
          $ref: '#/components/schemas/QualityGradeEnum'
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - harvest_date
      - id
      - quantity_kg
    InputExpense:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        input_type:
          $ref: '#/components/schemas/InputTypeEnum'
        item_name:
          type: string
          maxLength: 200
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit:
          type: string
          maxLength: 30
        amount_ksh:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        date_purchased:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount_ksh
      - created_at
      - date_purchased
      - id
      - input_type
      - item_name
      - quantity
      - unit
    InputTypeEnum:
      enum:
      - seed
      - fertilizer
      - pesticide
      - herbicide
      - equipment
      - other
      type: string
      description: |-
        * `seed` - Seed
        * `fertilizer` - Fertilizer
        * `pesticide` - Pesticide
        * `herbicide` - Herbicide
        * `equipment` - Equipment
        * `other` - Other
    LabourLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        worker:
          type: string
          format: uuid
        worker_name:
          type: string
          readOnly: true
        work_date:
          type: string
          format: date
        days_worked:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
        task_type:
          $ref: '#/components/schemas/TaskTypeEnum'
        total_pay_ksh:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - total_pay_ksh
      - work_date
      - worker
      - worker_name
    PaginatedBuyerList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
