openapi: 3.0.3
info:
  title: FarmLedger API
  version: 1.0.0
  description: Farm input & harvest tracking for Kenyan smallholder farmers
paths:
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      summary: Register a new farm owner account
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegister'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
          description: ''
  /api/v1/auth/token/:
    post:
      operationId: v1_auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Login — obtain JWT access + refresh tokens
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      summary: Rotate JWT access token using refresh token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/crops/:
    get:
      operationId: v1_crops_list
      description: Reference data — admin-managed, read-only for all authenticated
        users.
      summary: List all crop types
      parameters:
      - in: query
        name: crop_type
        schema:
          type: string
          enum:
          - cereal
          - fruit
          - legume
          - other
          - tuber
          - vegetable
        description: |-
          * `cereal` - Cereal
          * `legume` - Legume
          * `vegetable` - Vegetable
          * `fruit` - Fruit
          * `tuber` - Tuber
          * `other` - Other
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      tags:
      - Reference
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCropList'
          description: ''
  /api/v1/crops/{id}/:
    get:
      operationId: v1_crops_retrieve
      description: Reference data — admin-managed, read-only for all authenticated
        users.
      summary: Get a crop type
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this crop.
        required: true
      tags:
      - Reference
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crop'
          description: ''
